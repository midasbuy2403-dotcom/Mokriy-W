<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mokriy W | Los Santos Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        :root {
            --neon-blue:   #00f3ff;
            --neon-purple: #c300ff;
            --neon-pink:   #ff0099;
            --dark-bg:     #05050a;
            --glass:       rgba(18, 18, 35, 0.78);
        }

        * {
            margin:0; padding:0; box-sizing:border-box;
        }

        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background: var(--dark-bg);
            color: #f0f8ff;
            overflow-x: hidden;
            line-height: 1.4;
        }

        /* HERO ──────────────────────────────────────────────── */
        #hero {
            height: 100vh;
            min-height: 720px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: 
                linear-gradient(to bottom, rgba(8,8,28,0.92) 0%, rgba(8,8,28,0.96) 100%),
                url('https://images.alphacoders.com/853/853436.jpg') center/cover no-repeat fixed;
            /* Лучший найденный ночной Los Santos skyline → https://wall.alphacoders.com/big.php?i=853436 */
        }

        #hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(195,0,255,0.18) 0%, transparent 60%),
                radial-gradient(circle at 80% 70%, rgba(0,243,255,0.22) 0%, transparent 60%);
            pointer-events: none;
            animation: police-glow 10s infinite alternate ease-in-out;
        }

        @keyframes police-glow {
            0%,100% { opacity: 0.7; }
            50%     { opacity: 1;   }
        }

        .hero-content {
            position: relative;
            z-index: 3;
            padding: 2rem;
            max-width: 1100px;
        }

        .avatar-wrap {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 1.8rem;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 
                0 0 50px var(--neon-blue),
                0 0 100px var(--neon-purple),
                inset 0 0 30px rgba(255,255,255,0.18);
            transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);
        }

        .avatar-wrap:hover {
            transform: scale(1.09) rotate(3deg);
            box-shadow: 
                0 0 90px var(--neon-blue),
                0 0 160px var(--neon-purple);
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 5px solid rgba(0,243,255,0.4);
            filter: brightness(1.1) contrast(1.15);
        }

        .neon-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 4px solid transparent;
            background: conic-gradient(var(--neon-blue), var(--neon-purple), var(--neon-blue), var(--neon-purple)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            animation: spin 9s linear infinite;
        }

        @keyframes spin { to { transform: rotate(1turn); } }

        h1 {
            font-size: clamp(5rem, 14vw, 11rem);
            font-weight: 900;
            letter-spacing: -0.06em;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple), var(--neon-blue));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 
                0 0 30px var(--neon-blue),
                0 0 70px var(--neon-purple),
                0 0 120px rgba(255,0,153,0.6);
            animation: glow-pulse 4s ease-in-out infinite alternate;
        }

        @keyframes glow-pulse {
            from { text-shadow: 0 0 30px var(--neon-blue), 0 0 70px var(--neon-purple); }
            to   { text-shadow: 0 0 60px var(--neon-blue), 0 0 120px var(--neon-purple), 0 0 180px var(--neon-pink); }
        }

        .subtitle {
            font-size: clamp(1.6rem, 5vw, 2.6rem);
            font-family: 'Courier New', monospace;
            letter-spacing: 0.4em;
            color: #90e0ff;
            text-shadow: 0 0 25px var(--neon-blue);
            margin: -0.6rem 0 2rem;
        }

        .scroll-down {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.1rem;
            color: var(--neon-blue);
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float { 50% { transform: translate(-50%, 15px); } }

        /* SOCIALS ───────────────────────────────────────────── */
        #socials {
            padding: 140px 20px 100px;
            position: relative;
        }

        .panel {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--glass);
            backdrop-filter: blur(28px);
            border: 1px solid rgba(0,243,255,0.22);
            border-radius: 28px;
            padding: 60px 40px;
            box-shadow: 
                0 0 80px rgba(0,243,255,0.2),
                inset 0 0 50px rgba(195,0,255,0.12);
            transition: all 0.7s ease;
        }

        .panel:hover {
            box-shadow: 
                0 0 140px rgba(0,243,255,0.35),
                inset 0 0 80px rgba(195,0,255,0.25);
        }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 35px;
        }

        .btn-neon {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 22px;
            padding: 30px 50px;
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: white;
            text-decoration: none;
            border: 4px solid var(--neon-blue);
            border-radius: 18px;
            background: rgba(10,10,30,0.85);
            position: relative;
            overflow: hidden;
            transition: all 0.45s cubic-bezier(0.19,1,0.22,1);
        }

        .btn-neon::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 40%; height: 300%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
            transform: skewX(-20deg);
            transition: left 0.7s;
        }

        .btn-neon:hover::before { left: 150%; }

        .btn-neon:hover {
            transform: translateY(-14px) scale(1.06);
            border-color: var(--neon-purple);
            box-shadow: 0 0 70px var(--neon-blue), 0 0 130px var(--neon-purple);
            color: var(--neon-purple);
        }

        .btn-neon i {
            font-size: 3.6rem;
            filter: drop-shadow(0 0 18px currentColor);
        }

        .youtube { border-color: #ff0000; color: #ff4444; }
        .youtube:hover { border-color: #ff5555; color: #ff7777; box-shadow: 0 0 80px #ff0000aa; }

        /* FOOTER */
        footer {
            padding: 50px 20px;
            text-align: center;
            color: rgba(200,200,255,0.45);
            font-size: 0.95rem;
            letter-spacing: 0.12em;
            border-top: 1px solid rgba(195,0,255,0.18);
        }

        @media (max-width: 768px) {
            .avatar-wrap { width: 220px; height: 220px; }
            h1 { font-size: 6.5rem; }
            .panel { padding: 40px 25px; }
        }
    </style>
</head>
<body>

    <section id="hero">
        <div class="hero-content">
            <div class="avatar-wrap">
                <div class="neon-ring"></div>
                <img src="https://www.pixa.com/cdn-cgi/image/width=600,format=auto,onerror=redirect/https://files.oaiusercontent.com/file-abc123example-gta-v-style-avatar.jpg?X-Amz-..." 
                     alt="Mokriy W — GTA V RP персонаж" 
                     class="avatar">
                <!-- Замени на свою фотографию персонажа в стиле GTA V RP -->
                <!-- Или используй генератор: https://www.pixa.com/create/gta-v-avatar-editor -->
            </div>

            <h1>MOKRIY W</h1>
            <div class="subtitle">LOS SANTOS · ELITE GAMER</div>
        </div>

        <div class="scroll-down">
            <i class="fa-solid fa-chevron-down fa-2x"></i>
        </div>
    </section>

    <section id="socials">
        <div class="panel">
            <div class="social-grid">

                <a href="https://www.youtube.com/@Mokriy_W" target="_blank" class="btn-neon youtube">
                    <i class="fab fa-youtube"></i>
                    YOUTUBE
                    <small style="display:block; font-size:0.8em; opacity:0.7; margin-top:6px;">@Mokriy_W</small>
                </a>

                <a href="https://www.tiktok.com/@mokriy_w" target="_blank" class="btn-neon">
                    <i class="fab fa-tiktok"></i>
                    TIKTOK
                    <small style="display:block; font-size:0.8em; opacity:0.7; margin-top:6px;">@mokriy_w</small>
                </a>

            </div>
        </div>
    </section>

    <footer>
        © 2026 Mokriy W  ·  Los Santos, San Andreas  ·  All Rights Reserved
    </footer>

    <script>
        // Лёгкий мерцающий эффект каждые ~7 сек
        setInterval(() => {
            document.querySelector('h1').style.opacity = '0.92';
            setTimeout(() => document.querySelector('h1').style.opacity = '1', 140);
        }, 7000);

        // Параллакс фона (очень лёгкий)
        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            document.getElementById('hero').style.backgroundPositionY = (scroll * 0.12) + 'px';
        });
    </script>
</body>
</html>
